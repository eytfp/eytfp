<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="安全学习笔记 · 技术博客 · GitHub Pages" />
  <title>安全笔记</title>
  <!-- Docsify 主题（由 style.css 覆盖为极简技术风） -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/line-numbers/prism-line-numbers.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css" />
</head>
<body>
  <div id="app">加载中…</div>
  <script>
    function docsifyBasePath() {
      var path = decodeURI(location.pathname || "/");
      if (path === "/" || path === "/index.html") return "/";
      if (/index\.html$/i.test(path)) path = path.replace(/index\.html$/i, "");
      if (!path.endsWith("/")) path += "/";
      return path;
    }

    window.$docsify = {
      name: "安全笔记",
      repo: "",
      basePath: docsifyBasePath(),
      loadSidebar: "sidebar.md",
      loadNavbar: "navbar.md",
      maxLevel: 3,
      subMaxLevel: 0,
      hideSidebar: false,
      // --- 关键修改点 1: 降低初始化展开层级 ---
      sidebarDisplayLevel: 0, 
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      count: {
        countable: true,
        fontsize: '0.9em',
        color: 'rgb(90,90,90)',
        language: 'chinese'
      },
      auto2top: true,
      relativePath: true,
      notFoundPage: "404.md",
      search: {
        maxAge: 86400000,
        paths: "auto",
        placeholder: "搜索全文（标题 + 正文）…",
        noData: "无匹配结果",
        depth: 6,
        hideOtherSidebarContent: false,
      },
      plugins: [
        function (hook, vm) {
          // --- 关键修改点 2: 强制纠正插件的自动展开行为 ---
          hook.doneEach(function () {
            // 获取当前页面的路径
            const currentPath = vm.route.path;
            
            // 只有在首页时，才强制折叠所有目录
            if (currentPath === '/' || currentPath === '/README') {
              setTimeout(() => {
                document.querySelectorAll('.sidebar-nav li.folder.open').forEach(el => {
                  // 如果该目录下没有被激活的链接（active 类），就强行关闭它
                  if (!el.querySelector('a.active')) {
                    el.classList.remove('open');
                  }
                });
              }, 100); 
            }

            // 代码行号逻辑保持不变
            window.requestAnimationFrame(function () {
              document.querySelectorAll(".markdown-section pre").forEach(function (pre) {
                pre.classList.add("line-numbers");
              });
              if (window.Prism && Prism.plugins && Prism.plugins.lineNumbers) {
                try {
                  Prism.plugins.lineNumbers.resize();
                } catch (e) {}
              }
            });
          });
        },
      ],
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markup.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-clike.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-powershell.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-http.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markdown.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//unpkg.com/docsify-count/dist/countable.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js"></script>
</body>
</html>
